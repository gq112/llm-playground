<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推理指标观测仪表盘</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/observability.css">
</head>
<body>
    <header class="dashboard-topbar">
        <a class="dashboard-brand" href="/" aria-label="推理指标观测仪表盘首页">
            <span class="dashboard-mark" aria-hidden="true">AI</span>
            <span>推理指标<strong>观测仪表盘</strong></span>
        </a>
        <form class="target-form" id="target-form">
            <label for="target-url">Metrics source</label>
            <input id="target-url" type="url" placeholder="vLLM :8000 or SGLang :30000" autocomplete="url" required>
            <input id="target-api-key" type="password" placeholder="API key (optional)" autocomplete="off">
            <button type="submit" class="target-connect">Connect</button>
        </form>
        <div class="topbar-actions">
            <span id="target-status" class="target-status" role="status">No source connected</span>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">☼</button>
        </div>
    </header>

    <main id="observability-view" class="dashboard-main" aria-live="polite"></main>

    <script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
